<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>List of items</h1>
    <h2>Unordered (ul) List</h2>
    <ul>
        <li>Milk</li>
        <li>Cofee</li>
        <li>Tea</li>
        <li>Juice</li>
    </ul>
    <h2>Ordered list (ol)</h2>
    <ol>
        <li>Manago</li>
        <li>Banana</li>
        <li>Apple</li>
        <li>Grapes</li>
        <li>Guava</li>
    </ol>
</body>
</html>
